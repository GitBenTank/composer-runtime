name: Test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: composer-runtime

    steps:
      - uses: actions/checkout@v4
        with:
          path: composer-runtime

      - uses: actions/checkout@v4
        with:
          repository: GitBenTank/composer-system
          ref: main
          path: composer-system

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../composer-system
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pytest; fi

      - name: Run tests
        run: python -m pytest tests/ -q
