# Run tests with composer-system as a sibling directory (matches local dev + bridge imports).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: composer-runtime

    steps:
      - name: Checkout composer-runtime
        uses: actions/checkout@v4
        with:
          path: composer-runtime

      - name: Checkout composer-system
        uses: actions/checkout@v4
        with:
          repository: GitBenTank/composer-system
          ref: main
          path: composer-system

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ../composer-system
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        run: python -m pytest tests/ -q
